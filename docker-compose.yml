version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: tcet-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - tcet-pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tcet-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/chatbot
      # Directs backend container to Ollama running on the host machine
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    depends_on:
      - db
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tcet-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  tcet-pgdata:
    driver: local
